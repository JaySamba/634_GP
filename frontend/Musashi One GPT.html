<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Musashi One GPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chat-agent/styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0:        #06070b;
    --bg-1:        #0a0c14;
    --ink:         #e8ecf3;
    --ink-2:       #aeb6c6;
    --ink-3:       #7e8699;
    --ink-4:       #4d5468;
    --line:        rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.18);
    --glass-bg:    rgba(14, 18, 28, 0.42);
    --glass-bg-2:  rgba(20, 24, 36, 0.55);
    --accent:      #4DBEFF;     /* default; per-step overridden */
    --shadow-1:    0 16px 40px rgba(0, 0, 0, 0.45);
    --spring:      cubic-bezier(.32, 1.4, .42, 1);
    --ease-soft:   cubic-bezier(.4, 0, .2, 1);
  }

  html, body {
    background: var(--bg-0);
    color: var(--ink);
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    font-feature-settings: 'ss01', 'ss02';
    overflow: hidden;
    height: 100%;
    min-height: 100vh;
  }
  body { letter-spacing: -0.005em; }

  /* ── Root + canvases ──────────────────────────────────────────────── */
  .m1-root {
    position: fixed; inset: 0;
    overflow: hidden;
  }
  .m1-bg-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 1;
  }
  .m1-globe-wrap {
    position: absolute; inset: 0;
    z-index: 2;
    opacity: 0;
    transform: scale(0.96);
    transition: opacity 0.8s var(--ease-soft), transform 0.8s var(--spring);
    pointer-events: none;
  }
  .m1-globe-wrap.in {
    opacity: 1; transform: scale(1);
  }
  .m1-globe-wrap.zooming .m1-globe-vignette {
    opacity: 0.35;
    transition: opacity 1.4s ease;
  }
  .m1-globe-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .m1-globe-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 60%, transparent 30%, rgba(6, 7, 11, 0.85) 100%);
    pointer-events: none;
    transition: opacity 0.6s ease;
    opacity: 1;
  }
  .m1-cursor-trail {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 99;
    mix-blend-mode: screen;
  }

  /* ── Persistent header ────────────────────────────────────────────── */
  .m1-header {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 50;
    height: 64px;
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(6, 7, 11, 0.7), transparent);
    transform: translateY(-100%);
    transition: transform 0.7s var(--spring), opacity 0.5s ease;
    opacity: 0;
  }
  .m1-header.in {
    transform: translateY(0); opacity: 1;
  }
  .m1-header-brand {
    background: none; border: none; cursor: pointer;
    color: var(--ink);
    display: flex; align-items: center; gap: 14px;
    font-family: inherit;
  }
  .m1-header-mark {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 30% 30%, var(--accent), #1a2238 70%);
    color: rgba(255,255,255,0.95);
    font-size: 12px;
    box-shadow: 0 0 24px rgba(77, 190, 255, 0.4);
    transition: box-shadow .3s, background .3s;
  }
  .m1-header-name {
    display: flex; align-items: baseline; gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .m1-header-musashi { color: var(--ink); font-size: 14px; }
  .m1-header-one     { color: var(--ink-2); font-size: 14px; font-weight: 300; }
  .m1-header-gpt {
    font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
    color: var(--accent);
    padding: 3px 7px;
    border: 1px solid var(--accent);
    border-radius: 3px;
    margin-left: 4px;
  }
  .m1-header-right {
    display: flex; align-items: center; gap: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-3);
  }
  .m1-header-status {
    display: inline-flex; align-items: center; gap: 7px;
  }
  .m1-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4DFFC9;
    box-shadow: 0 0 8px #4DFFC9;
    animation: m1-pulse 2s ease infinite;
  }
  @keyframes m1-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* ── Stage / panels ───────────────────────────────────────────────── */
  .m1-stage {
    position: absolute; inset: 0;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .m1-panel {
    position: absolute;
    width: min(1100px, 92vw);
    transition:
      transform 0.55s var(--spring),
      opacity 0.45s var(--ease-soft),
      filter 0.45s var(--ease-soft);
    pointer-events: auto;
  }
  .m1-panel.m1-panel-chat {
    width: min(880px, 94vw);
    height: min(720px, 84vh);
  }

  /* ── Landing ──────────────────────────────────────────────────────── */
  .m1-landing {
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding-top: 60px;
  }
  .m1-eyebrow {
    display: inline-flex; gap: 12px; align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--ink-3);
    padding: 8px 18px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: rgba(8, 10, 16, 0.4);
    backdrop-filter: blur(20px);
    margin-bottom: 42px;
    opacity: 0;
    animation: fadeUp 0.7s 0.1s var(--spring) forwards;
  }
  .m1-eyebrow-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .m1-eyebrow-sep { color: var(--ink-4); }

  .m1-wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(48px, 9vw, 124px);
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 0.95;
    color: var(--ink);
    display: flex; align-items: baseline; justify-content: center;
    flex-wrap: nowrap;
    margin-bottom: 28px;
  }
  .m1-letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.4s var(--spring), filter 0.4s;
    text-shadow: 0 0 40px rgba(140, 200, 255, 0.15);
  }
  .m1-letter.in {
    opacity: 1; transform: translateY(0);
  }
  .m1-letter-space { display: inline-block; width: 0.35em; }
  .m1-wordmark-gpt {
    font-size: 0.28em;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-left: 0.4em;
    align-self: flex-end;
    padding-bottom: 0.4em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s 0.3s, transform 0.6s 0.3s var(--spring);
    font-family: 'IBM Plex Mono', monospace;
    border: 1px solid var(--accent);
    padding: 0.2em 0.5em;
    border-radius: 3px;
  }
  .m1-wordmark-gpt.in { opacity: 1; transform: translateY(0); }

  .m1-sub {
    font-size: 17px;
    color: var(--ink-2);
    font-weight: 300;
    letter-spacing: 0.01em;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.7s, transform 0.7s var(--spring);
  }
  .m1-sub.in { opacity: 1; transform: translateY(0); }

  .m1-cta {
    position: relative;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 18px 38px;
    background: rgba(20, 26, 40, 0.55);
    backdrop-filter: blur(20px);
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: 0.06em;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: translateY(14px) scale(0.96);
    transition:
      opacity 0.7s,
      transform 0.7s var(--spring),
      background 0.3s,
      box-shadow 0.3s,
      border-color 0.3s;
    margin-bottom: 60px;
  }
  .m1-cta.in { opacity: 1; transform: translateY(0) scale(1); }
  .m1-cta:hover {
    background: rgba(40, 60, 100, 0.5);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(77, 190, 255, 0.15),
                0 12px 40px rgba(77, 190, 255, 0.25);
  }
  .m1-cta:active { transform: translateY(0) scale(0.97); }
  .m1-cta-pulse {
    position: absolute; inset: -2px;
    border-radius: 100px;
    border: 1px solid var(--accent);
    opacity: 0;
    animation: ctaPulse 2.4s ease-out infinite;
  }
  @keyframes ctaPulse {
    0% { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.25); }
  }

  .m1-landing-foot {
    display: flex; gap: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-4);
    opacity: 0; transition: opacity 0.8s 0.2s;
  }
  .m1-landing-foot.in { opacity: 1; }
  .m1-dot-sep { color: var(--ink-4); opacity: 0.6; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Step header (shared) ─────────────────────────────────────────── */
  .m1-step { display: flex; flex-direction: column; align-items: center; }
  .m1-step-head { text-align: center; margin-bottom: 48px; }
  .m1-step-head.inline { margin-bottom: 28px; }
  .m1-step-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .m1-step-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 400;
    letter-spacing: -0.025em;
    color: var(--ink);
  }

  /* ── Scope panel ──────────────────────────────────────────────────── */
  .m1-scope-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 920px;
  }
  .m1-scope-card {
    position: relative;
    background: rgba(14, 18, 30, 0.42);
    backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--line-strong);
    border-radius: 28px;
    padding: 40px 36px 32px;
    text-align: left;
    color: var(--ink);
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.5s var(--spring), background 0.4s;
    font-family: inherit;
    transform-style: preserve-3d;
  }
  .m1-scope-card:hover {
    background: rgba(20, 28, 50, 0.55);
    border-color: var(--accent, var(--line-strong));
    box-shadow:
      0 0 0 1px var(--accent),
      0 20px 60px rgba(0, 0, 0, 0.5),
      0 0 80px rgba(77, 190, 255, 0.15);
  }
  .m1-scope-card:active { transform: scale(0.99) !important; }
  .m1-scope-tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--accent);
    padding: 5px 11px;
    border: 1px solid var(--accent);
    border-radius: 3px;
    margin-bottom: 28px;
    opacity: 0.9;
  }
  .m1-scope-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px; font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .m1-scope-desc {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 90%;
  }
  .m1-scope-foot {
    display: flex; align-items: center; justify-content: space-between;
  }
  .m1-scope-stat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em;
    color: var(--ink-3);
  }
  .m1-scope-arrow {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--line-strong);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink);
    transition: background 0.2s, transform 0.3s var(--spring), border-color 0.3s, color 0.3s;
  }
  .m1-scope-card:hover .m1-scope-arrow {
    background: var(--accent);
    border-color: var(--accent);
    color: #06070b;
    transform: translateX(6px);
  }
  .m1-scope-glow {
    position: absolute;
    inset: -50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
    z-index: -1;
  }
  .m1-scope-card:hover .m1-scope-glow { opacity: 0.06; }

  /* ── Method panel ─────────────────────────────────────────────────── */
  .m1-method-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 760px;
  }
  .m1-method-card {
    background: rgba(14, 18, 30, 0.42);
    backdrop-filter: blur(20px);
    border: 1px solid var(--line-strong);
    border-radius: 22px;
    padding: 36px 28px;
    text-align: left;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.3s, transform 0.4s var(--spring), background 0.3s;
    font-family: inherit;
  }
  .m1-method-card:hover {
    border-color: var(--accent);
    background: rgba(22, 30, 50, 0.55);
    transform: translateY(-4px);
  }
  .m1-method-icon { color: var(--accent); margin-bottom: 20px; }
  .m1-method-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 500;
    margin-bottom: 8px;
  }
  .m1-method-desc { font-size: 13px; color: var(--ink-2); margin-bottom: 24px; line-height: 1.5; }
  .m1-method-foot {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em;
    color: var(--ink-3);
    display: flex; gap: 8px; align-items: center;
  }
  .m1-method-card:hover .m1-method-foot { color: var(--accent); }

  /* ── Function (module) grid ───────────────────────────────────────── */
  .m1-function-step .m1-step-head { margin-bottom: 40px; }
  .m1-func-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 1020px;
  }
  .m1-func-card {
    position: relative;
    background: rgba(12, 16, 26, 0.5);
    backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 22px 20px;
    text-align: left;
    color: var(--ink);
    cursor: pointer;
    transition:
      border-color 0.3s, background 0.3s,
      transform 0.4s var(--spring),
      box-shadow 0.35s;
    font-family: inherit;
    overflow: hidden;
  }
  .m1-func-card.live {
    border-color: rgba(77, 190, 255, 0.35);
    background: rgba(16, 22, 38, 0.6);
  }
  .m1-func-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    background: rgba(22, 30, 52, 0.65);
    box-shadow:
      0 0 0 1px var(--accent),
      0 18px 50px rgba(0, 0, 0, 0.45),
      0 0 80px color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .m1-func-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 18px;
  }
  .m1-func-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
    transition: color 0.3s, background 0.3s, border-color 0.3s;
  }
  .m1-func-card.live .m1-func-icon {
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    border-color: color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .m1-func-card:hover .m1-func-icon {
    color: var(--accent);
    border-color: var(--accent);
  }
  .m1-func-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em;
    padding: 4px 8px;
    border-radius: 100px;
    color: var(--ink-4);
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .m1-func-badge.live {
    color: #06070b;
    background: var(--accent);
    border-color: var(--accent);
  }
  .m1-func-badge-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #06070b;
    animation: m1-pulse 1.6s ease infinite;
  }
  .m1-func-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px; font-weight: 500;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
  }
  .m1-func-desc {
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.55;
    margin-bottom: 22px;
    min-height: 40px;
  }
  .m1-func-foot {
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.16em;
    color: var(--ink-4);
  }
  .m1-func-arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-2);
    transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.3s var(--spring);
  }
  .m1-func-card:hover .m1-func-arrow {
    background: var(--accent); color: #06070b; border-color: var(--accent);
    transform: translateX(3px);
  }
  .m1-func-card.preview {
    opacity: 0.78;
  }
  .m1-func-card.preview:hover { opacity: 1; }

  /* ── Region tiles ─────────────────────────────────────────────────── */
  .m1-region-step { padding-top: 12vh; padding-bottom: 12vh; transition: opacity 0.6s ease, filter 0.6s ease; }
  .m1-region-step.zooming {
    opacity: 0.15;
    filter: blur(2px);
    pointer-events: none;
  }
  .m1-region-step.zooming .m1-region-tile { transform: none !important; }
  .m1-region-tile.selected {
    border-color: var(--accent);
    background: rgba(20, 28, 50, 0.7);
    box-shadow: 0 0 0 1px var(--accent), 0 0 80px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .m1-region-arc {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 960px;
    margin-top: 32px;
  }
  .m1-region-tile {
    position: relative;
    background: rgba(10, 14, 22, 0.55);
    backdrop-filter: blur(20px);
    border: 1px solid var(--line-strong);
    border-radius: 18px;
    padding: 24px 18px 22px;
    text-align: left;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.35s, background 0.35s, transform 0.4s var(--spring);
    font-family: inherit;
    overflow: hidden;
  }
  .m1-region-tile:hover, .m1-region-tile.active {
    border-color: var(--accent);
    background: rgba(20, 28, 50, 0.7);
    transform: translateY(-6px);
    box-shadow: 0 0 0 1px var(--accent), 0 16px 40px rgba(0,0,0,0.4), 0 0 60px color-mix(in srgb, var(--accent) 25%, transparent);
  }
  .m1-region-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .m1-region-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .m1-region-sub {
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.03em;
    margin-bottom: 18px;
  }
  .m1-region-bar {
    height: 2px;
    background: var(--accent);
    width: 0;
    transition: width 0.5s var(--spring);
    border-radius: 1px;
  }
  .m1-region-tile:hover .m1-region-bar,
  .m1-region-tile.active .m1-region-bar {
    width: 100%;
  }
  .m1-region-hint {
    margin-top: 36px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--ink-4);
    text-transform: uppercase;
  }

  /* ── Plant panel ──────────────────────────────────────────────────── */
  .m1-plant-step .m1-step-head { margin-bottom: 28px; }
  .m1-plant-groups {
    width: 100%;
    max-width: 720px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .m1-plant-group {
    background: rgba(10, 14, 22, 0.55);
    backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .m1-plant-group.open {
    border-color: var(--accent);
  }
  .m1-plant-region-head {
    width: 100%;
    background: none; border: none;
    padding: 18px 22px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
    transition: background 0.2s;
  }
  .m1-plant-region-head:hover { background: rgba(255,255,255,0.03); }
  .m1-plant-region-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .m1-plant-region-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px; font-weight: 500;
    letter-spacing: -0.01em;
    flex: 1; text-align: left;
  }
  .m1-plant-region-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em;
    color: var(--ink-3);
  }
  .m1-plant-region-caret {
    font-size: 18px; color: var(--ink-3);
    width: 24px; text-align: center;
    transition: color 0.2s;
  }
  .m1-plant-group.open .m1-plant-region-caret { color: var(--accent); }
  .m1-plant-chips {
    overflow: hidden;
    transition: max-height 0.45s var(--ease-soft);
    padding: 0 22px;
  }
  .m1-plant-group.open .m1-plant-chips { padding: 0 22px 18px; }
  .m1-plant-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .m1-plant-chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 8px 14px 8px 8px;
    color: var(--ink-2);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: border-color 0.2s, background 0.2s, color 0.2s, transform 0.2s;
  }
  .m1-plant-chip:hover {
    border-color: var(--accent);
    background: rgba(77, 190, 255, 0.1);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .m1-plant-chip-code {
    background: var(--accent);
    color: #06070b;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }
  .m1-plant-chip-name {
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.04em;
  }

  /* ── Connecting interstitial ──────────────────────────────────────── */
  .m1-connecting {
    text-align: center;
    padding-top: 80px; padding-bottom: 80px;
  }
  .m1-conn-rings {
    position: relative;
    width: 120px; height: 120px;
    margin: 0 auto 36px;
  }
  .m1-conn-rings span {
    position: absolute; inset: 0;
    border: 1px solid var(--accent);
    border-radius: 50%;
    animation: connRing 2.4s ease-out infinite;
    opacity: 0;
  }
  .m1-conn-rings span:nth-child(2) { animation-delay: 0.6s; }
  .m1-conn-rings span:nth-child(3) { animation-delay: 1.2s; }
  @keyframes connRing {
    0%   { transform: scale(0.2); opacity: 0.8; }
    80%  { opacity: 0.1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .m1-conn-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em;
    color: var(--ink-3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .m1-conn-agent {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 32px;
  }
  .m1-conn-shimmer {
    width: 260px; height: 2px;
    margin: 0 auto;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 200% 100%;
    animation: connShimmer 1.4s ease infinite;
    border-radius: 1px;
  }
  @keyframes connShimmer {
    0% { background-position: -100% 0; }
    100% { background-position: 100% 0; }
  }

  /* ── Chat ─────────────────────────────────────────────────────────── */
  .m1-chat {
    width: 100%; height: 100%;
    background: rgba(8, 10, 16, 0.5);
    backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid var(--line-strong);
    border-radius: 28px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }
  .m1-chat-head {
    padding: 16px 22px;
    display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--line);
  }
  .m1-back {
    background: none; border: 1px solid var(--line-strong);
    color: var(--ink-2);
    padding: 7px 13px 7px 11px;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 7px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .m1-back:hover { color: var(--ink); border-color: var(--accent); background: rgba(255,255,255,0.03); }
  .m1-breadcrumb {
    flex: 1;
    display: flex; align-items: center; gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--ink-3);
  }
  .m1-bc-sep { color: var(--ink-4); }
  .m1-bc-current { color: var(--accent); }
  .m1-chat-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 7px;
  }

  .m1-chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
  }
  .m1-chat-scroll::-webkit-scrollbar { width: 6px; }
  .m1-chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .m1-chat-thread {
    max-width: 760px; margin: 0 auto;
    padding: 0 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .m1-msg {
    display: flex; gap: 12px;
    animation: msgIn 0.45s var(--spring);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .m1-msg-user { justify-content: flex-end; }
  .m1-msg-avatar {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #4D4DFF);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    margin-top: 4px;
    box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  .m1-msg-bubble {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 78%;
    white-space: pre-wrap;
  }
  /* Markdown rendered inside agent bubbles */
  .m1-msg-md { white-space: normal; }
  .m1-msg-md p { margin: 0 0 0.6em; }
  .m1-msg-md p:last-child { margin-bottom: 0; }
  .m1-msg-md strong { color: var(--ink); font-weight: 600; }
  .m1-msg-md ol, .m1-msg-md ul { padding-left: 1.4em; margin: 0.4em 0 0.7em; }
  .m1-msg-md li { margin-bottom: 0.25em; }
  .m1-msg-md h1, .m1-msg-md h2, .m1-msg-md h3 {
    font-size: 13px; font-weight: 600; margin: 0.8em 0 0.3em; color: var(--ink);
  }
  .m1-msg-md code {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    background: rgba(255,255,255,0.08); border-radius: 4px; padding: 1px 5px;
  }
  .m1-msg-user .m1-msg-bubble {
    background: rgba(77, 190, 255, 0.14);
    border-color: rgba(77, 190, 255, 0.35);
    color: var(--ink);
  }
  .m1-msg-thinking {
    display: inline-flex; gap: 5px; padding: 14px 16px;
  }
  .m1-msg-thinking span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-3);
    animation: dotPulse 1.2s ease infinite;
  }
  .m1-msg-thinking span:nth-child(2) { animation-delay: 0.15s; }
  .m1-msg-thinking span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .m1-chat-inputwrap {
    padding: 18px 24px 22px;
    border-top: 1px solid var(--line);
  }
  .m1-chat-input {
    max-width: 760px; margin: 0 auto;
    display: flex; gap: 8px;
    background: rgba(8, 10, 16, 0.7);
    border: 1px solid var(--line-strong);
    border-radius: 100px;
    padding: 6px 6px 6px 22px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .m1-chat-input:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent),
                0 0 40px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .m1-chat-input input {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 15px;
    padding: 10px 0;
  }
  .m1-chat-input input::placeholder { color: var(--ink-4); }
  .m1-chat-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    color: #06070b;
    border: none;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform 0.2s, opacity 0.2s, background 0.2s;
  }
  .m1-chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .m1-chat-send:not(:disabled):hover { transform: translateX(2px); }
  .m1-chat-foot {
    max-width: 760px; margin: 10px auto 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
    color: var(--ink-4);
    text-transform: uppercase;
    display: flex; gap: 10px;
  }
  .m1-chat-foot-sep { opacity: 0.5; }
  .m1-chat-foot strong { color: var(--ink-2); font-weight: 500; }

  /* ── Floating back button (steps before chat) ─────────────────────── */
  .m1-floating-back {
    position: absolute; top: 80px; left: 32px;
    z-index: 30;
    background: rgba(14, 18, 28, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid var(--line-strong);
    color: var(--ink-2);
    padding: 8px 14px 8px 11px;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 7px;
    transition: border-color 0.2s, color 0.2s;
  }
  .m1-floating-back:hover { color: var(--ink); border-color: var(--accent); }

  /* ── Shader switcher (floating bottom-right) ──────────────────────── */
  .m1-shaderswitch {
    position: absolute; bottom: 28px; right: 28px;
    z-index: 60;
    background: rgba(14, 18, 28, 0.55);
    backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--line-strong);
    border-radius: 16px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 8px;
    box-shadow: var(--shadow-1);
    min-width: 200px;
  }
  .m1-shaderswitch-label,
  .m1-shaderswitch-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; letter-spacing: 0.22em;
    color: var(--ink-4);
    text-transform: uppercase;
  }
  .m1-shaderswitch-name {
    color: var(--accent);
    text-align: center;
    margin-top: 2px;
  }
  .m1-shaderswitch-row { display: flex; gap: 6px; justify-content: space-between; }
  .m1-shader-pip {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: none;
    cursor: pointer;
    padding: 2px;
    transition: border-color 0.25s, transform 0.25s var(--spring), box-shadow 0.25s;
  }
  .m1-shader-pip:hover { transform: translateY(-2px); }
  .m1-shader-pip.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 14px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .m1-shader-pip-inner {
    display: block; width: 100%; height: 100%;
    border-radius: 6px;
  }
  .pip-mercury   { background: linear-gradient(135deg, #1a2238, #c0c7d4, #1a2238); }
  .pip-plasma    { background: radial-gradient(circle at 30% 30%, #884dff, #1a4dff 50%, #00b4b4); }
  .pip-topo      { background: repeating-linear-gradient(45deg, #1f3550 0 2px, transparent 2px 6px), #0a1224; }
  .pip-particles { background: radial-gradient(circle at 30% 30%, #fff 0 1.5px, transparent 2px),
                              radial-gradient(circle at 70% 60%, #4DBEFF 0 1.5px, transparent 2px),
                              radial-gradient(circle at 40% 80%, #fff 0 1px, transparent 2px),
                              #060912; }
  .pip-glass     { background: linear-gradient(135deg, #2a5478 0%, #5a4488 50%, #2a8888 100%); filter: blur(0.3px); }

  /* ── Mobile fallback ──────────────────────────────────────────────── */
  @media (max-width: 720px) {
    .m1-bg-canvas { filter: brightness(0.6); }
    .m1-scope-grid, .m1-method-grid {
      grid-template-columns: 1fr;
    }
    .m1-region-arc {
      grid-template-columns: 1fr 1fr;
    }
    .m1-shaderswitch { bottom: 16px; right: 16px; min-width: 0; padding: 8px 10px; }
    .m1-shaderswitch-label, .m1-shaderswitch-name { display: none; }
    .m1-floating-back { top: 72px; left: 16px; }
    .m1-header { padding: 0 16px; }
    .m1-panel.m1-panel-chat { height: 90vh; width: 96vw; }
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/marked@9.1.6/marked.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Background engines (plain JS) -->
<script src="musashi-one/shaders.js"></script>
<script src="musashi-one/globe.js"></script>

<!-- Chat Agent components (load order matters: data → icons → leaves → composites → app) -->
<script type="text/babel" data-presets="react" src="chat-agent/data.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/icons.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/profile.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/composer.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/messages.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/welcome.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/right-panel.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/modals.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/sidebar.jsx"></script>
<script type="text/babel" data-presets="react" src="chat-agent/app.jsx"></script>

<!-- UI components + main app (JSX) -->
<script type="text/babel" data-presets="react" src="musashi-one/panels.jsx"></script>
<script type="text/babel" data-presets="react" src="musashi-one/app.jsx"></script>

</body>
</html>
